# BabyClaw — Docker Compose stack
# Local dev: Squid reaches internet via host network
# NAS deploy: replace proxy_net below with qnet-static-eth0-0fa2ce (external)
version: "3.9"

services:
  # ── Squid forward proxy with SSL bump + ICAP RESPMOD ──────────────────
  squid:
    build:
      context: ./squid
      dockerfile: Dockerfile.squid
    container_name: babyclaw-squid
    restart: unless-stopped
    ports:
      - "3128:3128"                    # HTTP proxy port on claw_net
    volumes:
      - ./squid/squid.conf:/etc/squid/squid.conf:ro
      - ./squid/blacklist.domains:/etc/squid/blacklist.domains:ro
      - ./squid/blacklist.patterns:/etc/squid/blacklist.patterns:ro
      - ./scratch/squid/cache:/var/spool/squid:rw
      - ./scratch/squid/logs:/var/log/squid:rw
      - ./scratch/squid/run:/run/squid:rw
    tmpfs:
      - /tmp:size=128M,mode=1777
    networks:
      - proxy_net
      - claw_net
    # Squid needs writable paths (logs, cache, run) — mounted as volumes
    # read_only: true not compatible with squid's runtime needs
    user: "13:13"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 512M
    mem_reservation: 256M
    cpus: "1.0"
    pids_limit: 256
    healthcheck:
      test: ["CMD-SHELL", "test -f /run/squid/squid.pid && kill -0 $(cat /run/squid/squid.pid) 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    dns:
      - 1.1.1.2                         # Cloudflare malware-filtering DNS

  # ── mitmproxy content inspection proxy ───────────────────────────────
  proxy:
    build:
      context: ./icap
      dockerfile: Dockerfile.mitm
    container_name: babyclaw-proxy
    restart: unless-stopped
    volumes:
      - ./icap/injection_patterns.txt:/etc/icap/injection_patterns.txt:ro
      - ./icap/block-page.html:/etc/icap/block-page.html:ro
      - ./icap/bypass_domains.txt:/etc/icap/bypass_domains.txt:ro
      - ./certs/babyclaw-ca.pem:/etc/icap/ca/babyclaw-ca.pem:ro
      - ./certs/babyclaw-ca.key:/etc/icap/ca/babyclaw-ca.key:ro
    networks:
      - claw_net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    mem_limit: 256M
    mem_reservation: 128M
    cpus: "1.0"
    pids_limit: 64
    healthcheck:
      test: ["CMD", "mitmdump", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── OpenClaw — warm standby, polls Telegram, runs news digest ────────
  claw:
    build:
      context: ./claw
      dockerfile: Dockerfile.claw
    container_name: babyclaw-claw
    restart: unless-stopped
    # Set UID/GID to match your host user for scratch volume permissions.
    # Default: 1000:1000. Override in your .env (UID=1002 GID=100) or hardcode below.
    user: "${UID:-1000}:${GID:-1000}"
    env_file:
      - secrets.env
    environment:
      # Route ALL traffic through inspection proxy (→ Squid → internet)
      - http_proxy=http://proxy:1344
      - https_proxy=http://proxy:1344
      - NO_PROXY=127.0.0.1,localhost,192.168.65.254,host.docker.internal
      # DeepSeek API key (from platform.deepseek.com)
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      # Telegram bot
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - TELEGRAM_ALLOW_FROM=${TELEGRAM_ALLOW_FROM:-[]}
      - GATEWAY_TOKEN=${GATEWAY_TOKEN:-}
      - TZ=${TZ:-UTC}
    volumes:
      - ./claw/soul.md:/home/claw/.openclaw/soul.md:ro
      - ./claw/agents.md:/home/claw/.openclaw/agents.md:ro
      - ./claw/cron:/home/claw/.openclaw/cron:ro
      - ./claw/sources.md:/home/claw/.openclaw/workspace/SOURCES.md:ro
      - ./scratch/claw:/home/claw/scratch:rw
      - ./claw/entrypoint.sh:/entrypoint.sh:ro
    tmpfs:
      - /tmp:size=256M,mode=1777
      - /home/claw/.openclaw/secrets:size=1M,mode=700
      - /run:size=64M,mode=1777
    networks:
      - claw_net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    mem_limit: 3G
    mem_reservation: 512M
    cpus: "2.0"
    pids_limit: 128
    entrypoint: ["/bin/bash", "/entrypoint.sh"]

networks:
  proxy_net:
    driver: bridge
    # Has internet access — Squid uses this for DNS and upstream
    ipam:
      config:
        - subnet: 10.40.0.0/24
  claw_net:
    driver: bridge
    # NOTE: not internal — OpenClaw needs outbound API access (proxied through Squid)
    # Internet-bound traffic still goes through the proxy chain
    ipam:
      config:
        - subnet: 10.41.0.0/24
