# BabyClaw Squid forward proxy
# Default-allow with blacklist. DNS via Cloudflare 1.1.1.2.
# Content inspection is handled by the separate inspection proxy (port 1344).

pid_filename /run/squid/squid.pid

# ── Network ──────────────────────────────────────────────────────────────
http_port 0.0.0.0:3128

# DNS — Docker internal + Cloudflare malware filtering
dns_nameservers 127.0.0.11 1.1.1.2 1.0.0.2

# ── Access Control ───────────────────────────────────────────────────────
acl blocked_domains dstdomain "/etc/squid/blacklist.domains"
acl blocked_patterns url_regex -i "/etc/squid/blacklist.patterns"
acl allowed_ports port 80 443 4000 8080
acl SSL_ports port 443
acl CONNECT method CONNECT

http_access deny blocked_domains
http_access deny blocked_patterns
http_access deny !allowed_ports
http_access deny CONNECT !SSL_ports
http_access allow CONNECT SSL_ports
http_access allow all

# ── Caching ──────────────────────────────────────────────────────────────
cache_dir ufs /var/spool/squid 100 16 256
maximum_object_size 50 MB

# ── Logging ──────────────────────────────────────────────────────────────
access_log stdio:/var/log/squid/access.log squid
cache_log /var/log/squid/cache.log

# ── Misc ─────────────────────────────────────────────────────────────────
httpd_suppress_version_string on
